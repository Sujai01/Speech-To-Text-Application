# Server Configuration
server.port=8080
spring.application.name=speech-to-text-saas

# PostgreSQL Database Configuration
# NOTE: Update credentials according to your local Postgres setup
spring.datasource.url=jdbc:postgresql://localhost:5432/stt_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
# 'update' automatically creates/updates database tables based on Entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Security Configuration
# 256-bit secret key for HMAC-SHA256 (Should be overridden in production using environment variables)
jwt.secret=4261656C64756E674261656C64756E674261656C64756E674261656C64756E67
# Token validity in milliseconds (e.g., 24 hours = 86400000 ms)
jwt.expiration=86400000

# File Upload Configuration
# Allowing up to 50MB for audio files
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Google Cloud Configuration
# In production, set this to the absolute path of your Google service account JSON key file
# spring.cloud.gcp.credentials.location=file:/path/to/credentials.json
